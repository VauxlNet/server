[licenses]
allow = ["MIT", "Apache-2.0", "MPL-2.0", "ISC", "BSD-2-Clause", "BSD-3-Clause"]

[bans]
multiple-versions = "warn"
deny = [
    { name = "openssl" },       # use rustls instead
    { name = "openssl-sys" },
]

[advisories]
db-urls   = ["https://github.com/rustsec/advisory-db"]
unmaintained  = "workspace"
yanked        = "warn"
