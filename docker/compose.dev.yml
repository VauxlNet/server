services:
  vauxl:
    build: { context: .., dockerfile: docker/Dockerfile }
    ports: ["8448:8448", "8008:8008"]
    environment:
      DATABASE_URL: postgres://vauxl:vauxl@db/vauxl
      REDIS_URL: redis://cache:6379
    depends_on: [db, cache]

  db:
    image: postgres:16
    environment: { POSTGRES_USER: vauxl, POSTGRES_PASSWORD: vauxl }
    volumes: [pgdata:/var/lib/postgresql/data]

  cache:
    image: redis:7-alpine

volumes: { pgdata: {} }
