services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vauxl
      POSTGRES_PASSWORD: vauxl
      POSTGRES_DB: vauxl
      POSTGRES_HOST_AUTH_METHOD: trust
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  cache:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata: {}
